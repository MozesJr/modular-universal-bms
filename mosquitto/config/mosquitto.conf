# =============================================
# Mosquitto MQTT Broker Configuration
# Modular Universal BMS Project
# =============================================

# Allow connections without authentication (dev mode)
# For production: enable password_file below
allow_anonymous true

# MQTT listener (for ESP32 and backend)
listener 1883
protocol mqtt

# WebSocket listener (optional: for browser-based MQTT clients)
listener 9001
protocol websockets

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_type all

# Connection limits
max_connections 100
max_keepalive 60

# ─── Production: Uncomment below ──────────
# password_file /mosquitto/config/passwd
# allow_anonymous false
